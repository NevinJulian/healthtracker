</button>
<h1 class="font-['Manrope'] font-bold tracking-tight text-2xl uppercase text-2xl font-black tracking-tighter text-[#ffb4a8]">KINETIC</h1>
<button class="text-slate-400 hover:opacity-80 transition-opacity scale-95 active:transition-transform">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-highest">

</button>
</header>
<main class="pt-24 px-5 max-w-4xl mx-auto">
<!-- Top Tab Navigator (Editorial Style) -->
<div class="flex items-baseline gap-6 mb-8">
<h2 class="font-headline text-3xl font-bold tracking-tight text-primary">Weekly Plan</h2>
<h2 class="font-headline text-xl font-medium tracking-tight text-on-surface-variant/50 hover:text-on-surface-variant transition-colors cursor-pointer">My Inventory</h2>
</div>
<!-- Horizontal 7-Day Calendar -->
<div class="mb-10">
<div class="flex items-center justify-between overflow-x-auto hide-scrollbar gap-2 pb-2">
<!-- Day 1 (Past) -->
<div class="flex flex-col items-center gap-2 min-w-[3rem]">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/40">Mon</span>
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant/40 font-body text-sm font-medium">12</div>
</div>
<!-- Day 2 (Past) -->
<div class="flex flex-col items-center gap-2 min-w-[3rem]">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/40">Tue</span>
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant/40 font-body text-sm font-medium">13</div>
</div>
<!-- Day 3 (Current) -->
<div class="flex flex-col items-center gap-2 min-w-[3rem] relative">
<span class="font-label text-[10px] uppercase tracking-widest text-primary font-bold">Wed</span>
<div class="w-12 h-12 rounded-full bg-primary flex items-center justify-center text-on-primary font-body text-base font-bold shadow-[0_0_16px_rgba(255,180,168,0.3)]">14</div>
<div class="absolute -bottom-3 w-1 h-1 rounded-full bg-primary"></div>
</div>
<!-- Day 4 (Future) -->
<div class="flex flex-col items-center gap-2 min-w-[3rem]">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Thu</span>
<div class="w-10 h-10 rounded-full bg-surface-container border border-outline-variant/20 flex items-center justify-center text-on-surface font-body text-sm font-medium">15</div>
</div>
<!-- Day 5 (Future) -->
<div class="flex flex-col items-center gap-2 min-w-[3rem]">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Fri</span>
<div class="w-10 h-10 rounded-full bg-surface-container border border-outline-variant/20 flex items-center justify-center text-on-surface font-body text-sm font-medium">16</div>
</div>
<!-- Day 6 (Future) -->
<div class="flex flex-col items-center gap-2 min-w-[3rem]">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Sat</span>
<div class="w-10 h-10 rounded-full bg-surface-container border border-outline-variant/20 flex items-center justify-center text-on-surface font-body text-sm font-medium">17</div>
</div>
<!-- Day 7 (Future) -->
<div class="flex flex-col items-center gap-2 min-w-[3rem]">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Sun</span>
<div class="w-10 h-10 rounded-full bg-surface-container border border-outline-variant/20 flex items-center justify-center text-on-surface font-body text-sm font-medium">18</div>
</div>
</div>
</div>
<!-- Daily Plan Content -->
<div class="space-y-8">
<!-- Lunch Slot -->

<div class="flex items-center gap-3 mb-4">
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">wb_sunny</span>

</div>
<div class="bg-surface-container-low rounded-xl overflow-hidden group relative">
<!-- Image Background -->
<div class="absolute inset-0 z-0">

<div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest via-surface-container-lowest/80 to-transparent"></div>
</div>
<div class="relative z-10 p-5 flex flex-col min-h-[160px] justify-end">
<div class="flex justify-between items-end">
<div>

<p class="font-body text-sm text-on-surface-variant">450 kcal • 35g P • 40g C</p>
</div>
<!-- Consumed Checkbox -->
<button class="w-12 h-12 rounded-full bg-tertiary-container/20 flex items-center justify-center hover:bg-tertiary-container/40 transition-colors">
<span class="material-symbols-outlined text-tertiary text-2xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</div>
</div>
</div>
</section>
<!-- Dinner Slot -->
<section>
<div class="flex items-center gap-3 mb-4">
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 0;">dark_mode</span>
<h3 class="font-headline text-xl text-on-surface font-semibold tracking-tight">Dinner</h3>
</div>
<div class="bg-surface-container-low rounded-xl overflow-hidden group relative">
<!-- Empty State / Add Recipe -->
<div class="p-6 flex flex-col items-center justify-center min-h-[160px] border border-dashed border-outline-variant/30 rounded-xl bg-surface-dim">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">add</span>
</div>
<p class="font-body text-sm text-on-surface-variant mb-1">No meal planned yet.</p>
<button class="text-primary font-label text-xs uppercase tracking-wider font-semibold hover:opacity-80 transition-opacity">Select from Inventory</button>
</div>
</div>
</section>
</div>
</main>

<button class="fixed bottom-28 right-5 z-40 glass-panel rounded-full px-5 py-4 flex items-center gap-3 shadow-[0_0_32px_rgba(226,226,229,0.04)] hover:scale-105 transition-transform active:scale-95 group">
<div class="w-8 h-8 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-[0_0_12px_rgba(255,180,168,0.4)]">
<span class="material-symbols-outlined text-on-primary text-lg" style="font-variation-settings: 'FILL' 1;">skillet</span>
</div>
<span class="font-label text-xs uppercase tracking-widest text-on-surface font-semibold pr-2">Log Prep</span>
</button>

<nav class="fixed bottom-0 w-full z-50 rounded-t-2xl bg-[#121416]/80 backdrop-blur-md border-t border-white/5 shadow-[0_-4px_20px_rgba(0,0,0,0.3)] fixed bottom-0 left-0 w-full flex justify-around items-center h-20 pb-safe px-4">

<!-- Atelier -->

<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">person</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-[0.05em]">Atelier</span>
</div>
</nav>
