name: Android Build Check

# Verifies the Android APK actually compiles on a real runner.
# The merge gate (typecheck + jest) is JS-only and cannot catch native/Gradle
# breakage (e.g. a reanimated <-> React Native C++ incompatibility), so this
# job builds the APK via EAS without publishing a release.
#
# Runs on PRs that touch dependency/native-affecting files, and on demand.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'app.json'
      - 'eas.json'
      - 'babel.config.js'
      - '.github/workflows/build-check.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build APK locally via EAS (verification only)
        run: eas build -p android --profile preview --local --non-interactive --output app-release.apk

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app-release.apk
          if-no-files-found: error
